<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PraizzFoodieExpress - Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="top-header">
        <img src="logo.png" alt="Logo" class="logo-img">
        <h1>PraizzFoodieExpress</h1>
    </div>

    <div class="header-center">
        <input type="text" class="search-bar" placeholder="Search for meals...">
        <button class="search-btn">Search</button>
    </div>

    <div class="header-right">
        <a href="#">Sign In</a>
        <a href="#">Orders</a>
        <a href="#">Cart (0)</a>
        <a href="#">Cart (<span id="cart-count">0</span>)</a>
    </div>
</header>

<section class="products">
    <h2 id="category-title">Products</h2>
    <div class="dynamic-products product-grid"></div>
</section>

<!-- Link External JS -->
<script src="script.js"></script>

</body>
</html>
